<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Under Live - Login</title>
    <style>
        body { margin: 0; background-color: #050A14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: 700; }
        .login-box { background: #0B1021; padding: 50px; border-radius: 30px; border: 2px solid #A855F7; width: 380px; text-align: center; }
        h2 { color: #00FFA3; font-size: 32px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 15px; border: 2px solid #1F293A; background: #080C18; color: white; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #00FFA3; color: #050A14; font-weight: 800; font-size: 18px; cursor: pointer; }
        #m { font-size: 13px; margin-top: 15px; color: #e63946; min-height: 18px; }
        .link { margin-top: 25px; color: #A855F7; cursor: pointer; font-size: 14px; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Under Live</h2>
        <p style="color:#88a096; margin-bottom:30px;">다시 만나서 반가워요!</p>
        <input type="text" id="uId" placeholder="아이디">
        <input type="password" id="uPw" placeholder="비밀번호">
        <button onclick="login()">로그인하기</button>
        <p id="m"></p>
        <a class="link" href="/join.html">회원가입</a>
        <a class="link" href="/" style="color:#555; margin-top:10px;">홈으로 돌아가기</a>
    </div>
    <script>
        async function login() {
            const uId = document.getElementById('uId').value;
            const uPw = document.getElementById('uPw').value;
            const m = document.getElementById('m');
            if (!uId || !uPw) return m.innerText = "아이디와 비밀번호를 입력해주세요.";
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uId, password: uPw })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('chatId', data.chat_id);
                    location.href = '/';
                } else { m.innerText = "아이디 또는 비밀번호가 일치하지 않습니다."; }
            } catch (err) { m.innerText = "서버와 연결할 수 없습니다."; }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
