<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Under Live - Join</title>
    <style>
        body { margin: 0; background-color: #050A14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: 700; }
        .join-box { background: #0B1021; padding: 50px; border-radius: 30px; border: 2px solid #00FFA3; width: 380px; text-align: center; }
        h2 { color: #A855F7; font-size: 32px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #1F293A; background: #080C18; color: white; box-sizing: border-box; font-size: 15px; font-weight: 700; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #A855F7; color: white; font-weight: 800; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="join-box">
        <h2>가입하기</h2>
        <p style="color:#88a096; margin-bottom:30px; font-size:14px;">Under Live의 새로운 가족이 되세요.</p>
        <input type="text" id="userId" placeholder="아이디">
        <input type="text" id="chatId" placeholder="표시될 채팅 별명">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="handleJoin()">회원가입 완료</button>
        <div style="margin-top:20px; color:#00FFA3; cursor:pointer; font-size:14px;" onclick="location.href='/login.html'">이미 계정이 있나요? 로그인</div>
    </div>
    <script>
        async function handleJoin() {
            const userId = document.getElementById('userId').value;
            const chatId = document.getElementById('chatId').value;
            const password = document.getElementById('password').value;
            if (!userId || !chatId || !password) return alert("모든 항목을 입력해주세요.");
            const res = await fetch('/api/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, chatId, password })
            });
            const data = await res.json();
            if (data.success) { alert("가입을 축하합니다! 로그인해 주세요."); location.href = '/login.html'; }
            else { alert(data.message || "가입 실패"); }
        }
    </script>
</body>
</html>
