<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Under Live - Studio</title>
    <style>
        body { margin: 0; background-color: #050A14; color: white; font-family: sans-serif; font-weight: 700; }
        .top-nav { height: 70px; background: #0B1021; display: flex; align-items: center; padding: 0 30px; border-bottom: 2px solid #A855F7; }
        .container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 260px; background: #0B1021; border-right: 2px solid #A855F7; padding: 30px 20px; flex-shrink: 0; }
        .main { flex: 1; padding: 50px; }
        .studio-card { background: #0B1021; padding: 40px; border-radius: 30px; border: 2px solid #1F293A; max-width: 800px; }
        .label { color: #A855F7; margin-top: 20px; font-size: 14px; }
        .key-group { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; background: #080C18; border: 2px solid #1F293A; padding: 15px; border-radius: 15px; color: #00FFA3; font-family: monospace; font-size: 18px; outline: none; }
        .btn { background: #00FFA3; color: #050A14; border: none; padding: 0 20px; border-radius: 15px; cursor: pointer; font-weight: 800; }
        .sidebar-btn { padding: 15px; border: 2px solid #A855F7; border-radius: 15px; text-align: center; color: #A855F7; cursor: pointer; transition: 0.3s; }
        .sidebar-btn:hover { background: #A855F7; color: white; }
        .logo-clickable { font-size:24px; color:#00FFA3; font-weight:800; cursor:pointer; transition: 0.3s; }
        .logo-clickable:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo-clickable" onclick="location.href='/'">🌿 Under Live Studio</div>
    </nav>
    <div class="container">
        <aside class="sidebar"><div class="sidebar-btn" onclick="location.href='/'">🏠 홈으로 가기</div></aside>
        <main class="main">
            <div class="studio-card">
                <h1 style="margin-top:0;">내 스트리밍 정보</h1>
                <div class="label">RTMP 서버 주소</div>
                <input type="text" id="rtmpAddr" readonly style="width:100%; margin-top:10px;">
                <div class="label">내 스트림 키</div>
                <div class="key-group">
                    <input type="password" id="streamKey" value="********" readonly>
                    <button class="btn" onclick="toggleKey()" id="tBtn">보기</button>
                    <button class="btn" style="background:#A855F7; color:white;" onclick="copyKey()">복사</button>
                </div>
                <p style="color:#ff4d4d; font-size:13px; margin-top:30px;">⚠️ 주의: 스트림 키가 유출되지 않도록 하세요!</p>
            </div>
        </main>
    </div>
    <script>
        async function load() {
            const uId = localStorage.getItem('userId');
            if (!uId) return location.href='/login.html';
            document.getElementById('rtmpAddr').value = `rtmp://${window.location.hostname}/live`;
            try {
                const res = await fetch(`/api/studio/${uId}`);
                const data = await res.json();
                if (data.success) document.getElementById('streamKey').value = data.streamKey;
            } catch (e) { console.error(e); }
        }
        function toggleKey() {
            const k = document.getElementById('streamKey');
            const b = document.getElementById('tBtn');
            k.type = k.type === "password" ? "text" : "password";
            b.innerText = k.type === "password" ? "보기" : "숨기기";
        }
        function copyKey() {
            const k = document.getElementById('streamKey');
            const t = k.type; k.type = "text"; k.select(); document.execCommand('copy'); k.type = t;
            alert("키가 복사되었습니다!");
        }
        load();
    </script>
</body>
</html>
